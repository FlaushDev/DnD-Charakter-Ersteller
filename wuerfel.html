<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online-Würfel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <meta name="description" content="Eine Website zur Vereinfachung von D&D Spielen">
    <meta name="keywords" content="Fantasy D&D DnD Würfel Charakter+Ersteller Charakter Ersteller 2014 2024">
    <link rel="icon" type="image/x-icon" href="logo.ico">
    <script type="module" src="main-script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
</head>

<body>
    <div class="header">
        <div class="nav-container">
            <a class="logo" href="homepage.html">
                <div class="logo-banner">
                    <span class="logo-text">Tools n' Trinkets</span>
                </div>
            </a>
            <nav>
                <a href="https://github.com/FlaushDev/DnD-Charakter-Ersteller">Github</a>
                <a href="impressum.html">Impressum</a>
            </nav>
        </div>
    </div>
    <div class="hero">
        <h1>Online-Würfel</h1>
    </div>
    <div class="container">
        <div class="form-section">
            <div class="form-group">
                <label>Würfel auswählen:</label>
                <select class="select" id="wuerfelAuswahl">
                    <option value="3">3-seitiger Würfel</option>
                    <option value="4">4-seitiger Würfel</option>
                    <option value="6">6-seitiger Würfel</option>
                    <option value="8">8-seitiger Würfel</option>
                    <option value="10">10-seitiger Würfel</option>
                    <option value="12">12-seitiger Würfel</option>
                    <option value="20" selected>20-seitiger Würfel</option>
                    <option value="100">100-seitiger Würfel</option>
                    <option value="500">500-seitiger Würfel</option>
                    <option value="1000">1000-seitiger Würfel</option>
                    <option value="1000000">1.000.000-seitiger Würfel (Könnte die Webseite crashen)</option>
                </select>
                <label>Anzahl an Würfeln:</label>
                <input type="number" min="1" max="999" step="1" value="1" class="spinner-control" id="wuerfelAnzahl">
                <button class="wuerfel-button" onclick="getDiceRoll()"
                    style="margin-top: 15px; margin-bottom: 10px; margin-left: 0px;">🎲 Würfeln</button>
                <button class="reset-button" onclick="resetDicePage()">↻ Zurücksetzen</button>
                <div>
                    <label class="label-select">Ergebnisse:</label>
                </div>
                <textarea class="wuerfel-output" id="wuerfelOutput" readonly></textarea>
            </div>
        </div>
    </div>
    <footer>
        <p>Erstellt von Paul S.| Alle Rechte vorbehalten © 2025 | owner@tools-n-trinkets.at </p>
    </footer>
</body>

</html>
